<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#1a1a2e" />
  <link rel="manifest" href="/manifest.json" />
  <title data-i18n="appTitle">Hermes Control Interface</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon-Bkag5KeL.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github-dark.min.css" crossorigin="anonymous">
  <script type="module" crossorigin src="/assets/index--142INFl.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-DBcH9-mv.css">
</head>
<body>
  <div id="login-overlay" class="overlay">
    <div class="login-card">
      <div class="login-brand" data-i18n="appTitle">Hermes Control Interface</div>
      <div class="login-sub" id="login-sub" data-i18n="login.subtitle">Enter credentials to continue</div>
      <form id="login-form" class="login-form">
        <input id="login-username" type="text" placeholder="Username" data-i18n-placeholder="login.username" autocomplete="username" />
        <input id="login-password" type="password" placeholder="Password" data-i18n-placeholder="login.password" autocomplete="current-password" />
        <button type="submit" class="btn btn-primary" data-i18n="login.unlock">unlock</button>
      </form>
      <form id="setup-form" class="login-form" style="display:none;">
        <div class="login-sub" data-i18n="login.subtitleFirstRun">First run — create admin account</div>
        <input id="setup-username" type="text" placeholder="Username" data-i18n-placeholder="login.username" autocomplete="username" />
        <input id="setup-password" type="password" placeholder="Password (min 8 chars)" data-i18n-placeholder="login.passwordMin" autocomplete="new-password" />
        <input id="setup-password-confirm" type="password" placeholder="Confirm password" data-i18n-placeholder="login.confirmPassword" autocomplete="new-password" />
        <button type="submit" class="btn btn-primary" data-i18n="login.createAdmin">create admin</button>
      </form>
      <div id="login-error" class="login-error"></div>
    </div>
  </div>

  <div id="app" style="display:none;">
    <header id="topbar">
      <div class="topbar-left">
        <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu" data-i18n-aria="topbar.toggleMenu">☰</button>
        <img src="/assets/hermes-icon-BhPDiZ8G.svg" alt="Hermes" class="brand-logo" />
        <div class="brand-sub" data-i18n="appTitle">Hermes Control Interface</div>
      </div>
      <nav class="topbar-nav" id="nav">
        <a href="#home" class="nav-link active" data-page="home" data-i18n="topbar.home">Home</a>
        <a href="#chat" class="nav-link" data-page="chat" data-i18n="topbar.chat">Chat</a>
        <a href="#agents" class="nav-link" data-page="agents" data-i18n="topbar.agents">Agents</a>
        <a href="#office" class="nav-link" data-page="office" data-i18n="topbar.office">Office</a>
        <a href="#mon" class="nav-link" data-page="mon" data-i18n="topbar.monitor">Monitor</a>
        <a href="#usage" class="nav-link" data-page="usage" data-i18n="topbar.usage">Usage</a>
        <a href="#logs" class="nav-link" data-page="logs" data-i18n="topbar.logs">Logs</a>
        <a href="#skills" class="nav-link" data-page="skills" data-i18n="topbar.skills">Skills</a>
        <a href="#workspace" class="nav-link" data-page="workspace" data-i18n="topbar.workspace">Workspace</a>
        <a href="#files" class="nav-link" data-page="files" data-i18n="topbar.files">Files</a>
        <a href="#mcp" class="nav-link" data-page="mcp" data-i18n="topbar.mcp">MCP</a>
        <a href="#maintenance" class="nav-link" data-page="maintenance" data-i18n="topbar.maintenance">Maintenance</a>
      </nav>
      <div class="topbar-right">
        <button class="icon-btn" id="notif-btn" title="Notifications" data-i18n-title="topbar.notifications" onclick="toggleNotifDropdown()">
          <span class="notif-icon">🔔</span>
          <span class="notif-badge" id="notif-badge" style="display:none;">0</span>
        </button>
        <button class="icon-btn" id="theme-toggle" title="Toggle theme" data-i18n-title="topbar.toggleTheme">
          <span id="theme-icon">🌙</span>
        </button>
        <div class="user-menu" id="user-menu">
          <button class="user-btn" id="user-btn" onclick="toggleUserDropdown()">
            <span id="user-name">admin</span>
            <span class="user-role" id="user-role">admin</span>
          </button>
          <div class="user-dropdown" id="user-dropdown" style="display:none;">
            <button class="dropdown-item" id="users-mgmt-btn" style="display:none;"><span>👥 </span><span data-i18n="topbar.userManagement">User Management</span></button>
            <button class="dropdown-item" id="change-password-btn" data-i18n="topbar.changePassword">Change Password</button>
            <button class="dropdown-item" id="logout-btn" data-i18n="topbar.logout">Logout</button>
          </div>
        </div>
      </div>
    </header>

    <div id="notif-dropdown" class="notif-dropdown" style="display:none;">
      <div class="notif-header">
        <span data-i18n="notif.title">Notifications</span>
        <button class="btn-link" id="notif-clear" data-i18n="notif.clearAll">Clear all</button>
      </div>
      <div id="notif-list" class="notif-list">
        <div class="notif-empty" data-i18n="notif.empty">No notifications</div>
      </div>
    </div>

    <main id="main">
      <div id="page-home" class="page active"></div>
      <div id="page-mon" class="page"></div>
      <div id="page-agents" class="page"></div>
      <div id="page-agent-detail" class="page"></div>
      <div id="page-usage" class="page"></div>
      <div id="page-skills" class="page"></div>
      <div id="page-chat" class="page"></div>
      <div id="page-users" class="page"></div>
      <div id="page-logs" class="page"></div>
      <div id="page-maintenance" class="page"></div>
      <div id="page-files" class="page"></div>
      <div id="page-workspace" class="page"></div>
      <div id="page-office" class="page"></div>
      <div id="page-mcp" class="page"></div>
    </main>
  </div>

  <div id="password-modal" class="modal-overlay" style="display:none;">
    <div class="modal-card">
      <div class="modal-title" data-i18n="passwordModal.title">Change Password</div>
      <form id="password-form">
        <input id="current-password" type="password" placeholder="Current password" data-i18n-placeholder="passwordModal.current" autocomplete="current-password" />
        <input id="new-password" type="password" placeholder="New password (min 8 chars)" data-i18n-placeholder="passwordModal.new" autocomplete="new-password" />
        <input id="confirm-new-password" type="password" placeholder="Confirm new password" data-i18n-placeholder="passwordModal.confirm" autocomplete="new-password" />
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="password-cancel" data-i18n="passwordModal.cancel">Cancel</button>
          <button type="submit" class="btn btn-primary" data-i18n="passwordModal.update">Update</button>
        </div>
      </form>
      <div id="password-error" class="login-error"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js" crossorigin="anonymous"></script>
</body>
</html>
